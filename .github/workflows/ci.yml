name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tit_proy
          POSTGRES_USER: tit_user
          POSTGRES_PASSWORD: tit_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U tit_user -d tit_proy"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+psycopg://tit_user:tit_pass@localhost:5432/tit_proy
      SECRET_KEY: testsecret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: pytest -q
