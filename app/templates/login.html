<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/gosocket.css') }}">
</head>
<body class="gs-login">
  <div id="container" class="cls-container" style="background:#ffffff;">
    <!-- Top bar naranja con marca centrada -->
    <div class="gs-topbar gs-topbar-center">
      <span class="gs-brand">Sistema ETL de DTE's</span>
    </div>

    <!-- Contenido centrado -->
    <div class="cls-content">
      <div class="cls-content-sm panel">
        <div class="panel-body">
          <form method="post" action="/auth/login" id="fms" style="margin-top:20px;">
            <!-- Correo -->
            <div class="form-group">
              <div class="input-group">
                <div class="input-icon" aria-hidden="true">
                  <!-- Sobre -->
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" role="img">
                    <path d="M4 6h16a2 2 0 0 1 2 2v.4l-10 6.25L2 8.4V8a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M2 9.5V16a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9.5l-9.4 5.9a2 2 0 0 1-2.2 0L2 9.5Z" stroke="currentColor" stroke-width="1.5"/>
                  </svg>
                </div>
                <input
                  required
                  name="email"
                  type="email"
                  value="{{ last_email or '' }}"
                  placeholder="Correo Electrónico"
                  maxlength="100"
                  autocomplete="username"
                />
              </div>
            </div>

            <!-- Contraseña -->
            <div class="form-group">
              <div class="input-group">
                <div class="input-icon" aria-hidden="true">
                  <!-- Candado -->
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" role="img">
                    <rect x="4" y="10" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.5"/>
                  </svg>
                </div>
                <input
                  required
                  id="password"
                  name="password"
                  type="password"
                  placeholder="Contraseña"
                  maxlength="100"
                  autocomplete="current-password"
                />
              </div>
            </div>

            <!-- Botón -->
            <button class="btn btn-gosocket" type="submit" id="sbmbtn">Entrar</button>
          </form>
        </div>

        <!-- Nota demo
          <p class="footer-note">
          Usuarios demo tras /auth/seed:
          <strong>reader@example.com / reader123</strong> ,
          <strong>contrib@example.com / contrib123</strong> y
          <strong>admin@example.com / admin123</strong>
        -->
        </p>
      </div>
    </div>
  </div>
</body>
</html>
